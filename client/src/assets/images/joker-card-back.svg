<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <defs>
    <linearGradient id="backBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="50%" stop-color="#a02020"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
    </linearGradient>
    <linearGradient id="ornGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
    <pattern id="diamonds" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <path d="M10,0 L20,10 L10,20 L0,10 Z" fill="rgba(255,255,255,0.06)"/>
    </pattern>
    <pattern id="crosshatch" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <clipPath id="innerClip">
      <rect x="12" y="12" width="226" height="326" rx="8"/>
    </clipPath>
  </defs>

  <!-- Card body -->
  <rect x="2" y="2" width="246" height="346" rx="14" fill="url(#backBg)" stroke="#d44" stroke-width="2"/>

  <!-- Inner border -->
  <rect x="10" y="10" width="230" height="330" rx="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Second inner border -->
  <rect x="16" y="16" width="218" height="318" rx="8" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>

  <!-- Diamond pattern fill -->
  <rect x="16" y="16" width="218" height="318" rx="8" fill="url(#diamonds)"/>

  <!-- Crosshatch overlay -->
  <rect x="16" y="16" width="218" height="318" rx="8" fill="url(#crosshatch)"/>

  <!-- Central ornate design -->
  <g transform="translate(125, 175)" clip-path="url(#innerClip)">
    <!-- Outer ornamental ring -->
    <ellipse cx="0" cy="0" rx="65" ry="90" fill="none" stroke="url(#ornGrad)" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="55" ry="78" fill="none" stroke="url(#ornGrad)" stroke-width="0.8" opacity="0.4"/>

    <!-- Central medallion -->
    <circle cx="0" cy="0" r="35" fill="rgba(139,26,26,0.8)" stroke="url(#ornGrad)" stroke-width="2"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#ornGrad)" stroke-width="0.8" opacity="0.6"/>

    <!-- Fleur-de-lis inspired center (simplified) -->
    <!-- Center petal -->
    <path d="M0,-20 C-3,-15 -4,-8 -3,-2 C-2,2 -1,4 0,5 C1,4 2,2 3,-2 C4,-8 3,-15 0,-20 Z" fill="url(#ornGrad)" opacity="0.7"/>
    <!-- Left petal -->
    <path d="M0,0 C-8,-12 -16,-15 -18,-10 C-19,-6 -15,-2 -8,0 Z" fill="url(#ornGrad)" opacity="0.6"/>
    <!-- Right petal -->
    <path d="M0,0 C8,-12 16,-15 18,-10 C19,-6 15,-2 8,0 Z" fill="url(#ornGrad)" opacity="0.6"/>
    <!-- Bottom -->
    <path d="M0,0 C-4,8 -3,16 0,20 C3,16 4,8 0,0 Z" fill="url(#ornGrad)" opacity="0.5"/>
    <!-- Small circle at center -->
    <circle cx="0" cy="0" r="3" fill="url(#ornGrad)" opacity="0.8"/>

    <!-- Corner flourishes -->
    <g opacity="0.4">
      <!-- Top-left -->
      <path d="M-70,-110 Q-60,-100 -50,-105 Q-55,-95 -45,-90" fill="none" stroke="url(#ornGrad)" stroke-width="1.2"/>
      <path d="M-65,-115 Q-55,-105 -45,-110" fill="none" stroke="url(#ornGrad)" stroke-width="0.8"/>
      <!-- Top-right -->
      <path d="M70,-110 Q60,-100 50,-105 Q55,-95 45,-90" fill="none" stroke="url(#ornGrad)" stroke-width="1.2"/>
      <path d="M65,-115 Q55,-105 45,-110" fill="none" stroke="url(#ornGrad)" stroke-width="0.8"/>
      <!-- Bottom-left -->
      <path d="M-70,110 Q-60,100 -50,105 Q-55,95 -45,90" fill="none" stroke="url(#ornGrad)" stroke-width="1.2"/>
      <path d="M-65,115 Q-55,105 -45,110" fill="none" stroke="url(#ornGrad)" stroke-width="0.8"/>
      <!-- Bottom-right -->
      <path d="M70,110 Q60,100 50,105 Q55,95 45,90" fill="none" stroke="url(#ornGrad)" stroke-width="1.2"/>
      <path d="M65,115 Q55,105 45,110" fill="none" stroke="url(#ornGrad)" stroke-width="0.8"/>
    </g>

    <!-- Suit symbols at cardinal points -->
    <text x="0" y="-58" text-anchor="middle" font-size="14" fill="url(#ornGrad)" opacity="0.5">&#9824;</text>
    <text x="0" y="67" text-anchor="middle" font-size="14" fill="url(#ornGrad)" opacity="0.5">&#9827;</text>
    <text x="-48" y="5" text-anchor="middle" font-size="14" fill="url(#ornGrad)" opacity="0.5">&#9829;</text>
    <text x="48" y="5" text-anchor="middle" font-size="14" fill="url(#ornGrad)" opacity="0.5">&#9830;</text>

    <!-- Decorative dots along the oval -->
    <circle cx="0" cy="-90" r="2" fill="url(#ornGrad)" opacity="0.4"/>
    <circle cx="0" cy="90" r="2" fill="url(#ornGrad)" opacity="0.4"/>
    <circle cx="-65" cy="0" r="2" fill="url(#ornGrad)" opacity="0.4"/>
    <circle cx="65" cy="0" r="2" fill="url(#ornGrad)" opacity="0.4"/>
    <circle cx="-46" cy="-64" r="1.5" fill="url(#ornGrad)" opacity="0.3"/>
    <circle cx="46" cy="-64" r="1.5" fill="url(#ornGrad)" opacity="0.3"/>
    <circle cx="-46" cy="64" r="1.5" fill="url(#ornGrad)" opacity="0.3"/>
    <circle cx="46" cy="64" r="1.5" fill="url(#ornGrad)" opacity="0.3"/>
  </g>

  <!-- Subtle vignette effect -->
  <rect x="2" y="2" width="246" height="346" rx="14" fill="url(#backBg)" opacity="0" style="mix-blend-mode:multiply"/>
</svg>
