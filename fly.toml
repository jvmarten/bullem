app = 'bullem'
primary_region = 'arn'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  # With the Redis adapter enabled, scale to 2+ machines for high availability:
  #   fly scale count 2
  # Each machine handles its own WebSocket connections; the Redis adapter syncs
  # Socket.io events across instances. Fly.io's proxy maintains WebSocket
  # stickiness after the TCP upgrade, so no additional session affinity config
  # is needed (client forces transports: ['websocket']).

  [http_service.concurrency]
    type = 'connections'
    # Soft limit: Fly.io starts new machines when an instance exceeds this count.
    # WebSocket connections are long-lived, so set this to the target max per
    # instance. Adjust based on memory/CPU profiling under load.
    soft_limit = 1000
    # Hard limit: Fly.io will not route new connections to an instance above
    # this count. Provides backpressure to prevent overload.
    hard_limit = 1500

[[vm]]
  size = 'shared-cpu-1x'
  memory = 512

[checks]
  [checks.health]
    port = 3001
    type = 'http'
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'
