name: CI

on:
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Test shared
        run: npm test -w shared

      - name: Test server
        run: npm test -w server

      - name: Test client
        run: npm test -w client
