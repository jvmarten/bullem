name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/cache/save@v4
        with:
          path: |
            shared/dist
            server/dist
            client/dist
            node_modules
            shared/node_modules
            server/node_modules
            client/node_modules
          key: build-${{ github.sha }}

  test-shared:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: |
            shared/dist
            server/dist
            client/dist
            node_modules
            shared/node_modules
            server/node_modules
            client/node_modules
          key: build-${{ github.sha }}

      - run: npm test -w shared

  test-server:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: |
            shared/dist
            server/dist
            client/dist
            node_modules
            shared/node_modules
            server/node_modules
            client/node_modules
          key: build-${{ github.sha }}

      - run: npm test -w server

  test-client:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: |
            shared/dist
            server/dist
            client/dist
            node_modules
            shared/node_modules
            server/node_modules
            client/node_modules
          key: build-${{ github.sha }}

      - run: npm test -w client

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: docker build -t bullem:ci .
