name: Deploy

on:
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Test shared
        run: npm test -w shared

      - name: Test server
        run: npm test -w server

      - name: Test client
        run: npm test -w client

      # TODO(scale): Update to Node 24 version when superfly/flyctl-actions releases one (v1.5 is latest, still on Node 20)
      - uses: superfly/flyctl-actions/setup-flyctl@v1.5

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
